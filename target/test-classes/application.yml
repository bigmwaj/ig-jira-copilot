spring:
  application:
    name: ig-jira-copilot-test

camel:
  springboot:
    name: IgJiraCopilotTestContext
    main-run-controller: false

app:
  jira:
    base-url: https://test.atlassian.net
    username: test-user
    api-token: test-token
    project-key: TEST
    ai-exchange-tracking-field: customfield_10100
    ai-agent-label: AI-Agent
  copilot:
    api-url: https://api.test.com
    api-key: test-key
    model: gpt-4o
    max-poll-attempts: 3
    poll-interval-ms: 10
  routes:
    scan-interval-ms: 99999999

logging:
  level:
    ca.espconsulting: DEBUG
    org.apache.camel: WARN
